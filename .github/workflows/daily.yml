# .github/workflows/daily_scan.yml
# =================================
# 毎営業日の銘柄スキャン + Discord 通知
# 平日 06:30 JST（= UTC 21:30 前日）に自動実行

name: Daily Stock Scan

on:
  schedule:
    - cron: "30 21 * * 0-4"   # UTC 21:30 = JST 06:30（日〜木 → 月〜金実行）
  workflow_dispatch:            # 手動実行も可能

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL:          ${{ secrets.DATABASE_URL }}
      JQUANTS_API_KEY:       ${{ secrets.JQUANTS_API_KEY }}
      GOOGLE_API_KEY:        ${{ secrets.GOOGLE_API_KEY }}
      DISCORD_WEBHOOK_URL:   ${{ secrets.DISCORD_WEBHOOK_URL }}
      JQUANTS_MIN_INTERVAL_SEC: "13"   # Free プラン: 5 req/min

    steps:
      - name: ☁️ リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 🚀 銘柄スキャン実行
        run: python main.py

name: Daily Stock Analysis
on:
  schedule:
    # 平日（月-金）の日本時間 17:15 に実行（UTC 08:15）
    - cron: '15 8 * * 1-5'
  workflow_dispatch: # テスト用に手動ボタンも残しておきます

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas yfinance sqlalchemy psycopg2-binary jquants-api-client google-generativeai requests

      - name: Run Daily Analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JQUANTS_MAIL: ${{ secrets.JQUANTS_MAIL }}
          JQUANTS_PASSWORD: ${{ secrets.JQUANTS_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # main.pyのバックテスト部分を動かさないように制御します
        run: |
          python -c "
          import portfolio_manager, signal_engine, database_manager, requests, os;
          portfolio_manager.sync_data();
          db = database_manager.DBManager();
          daily_data = db.load_analysis_data(days=150);
          signals = signal_engine.scan_signals(daily_data);
          if signals:
              report = '🏛️ **【AI投資顧問：銘柄検知速報】**\n';
              for s in signals:
                  report += f'📌 **{s[\"ticker\"]}** ({int(s[\"price\"])}円)\n{s[\"insight\"]}\n────────────────────\n';
              requests.post(os.getenv('DISCORD_WEBHOOK_URL'), json={'content': report});
          else:
              requests.post(os.getenv('DISCORD_WEBHOOK_URL'), json={'content': '✅ 本日のスキャン完了：条件合致なし'});
          "

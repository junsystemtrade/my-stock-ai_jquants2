name: Daily Stock Analysis
on:
  schedule:
    # 平日（月-金）の日本時間 17:15 に実行（UTC 08:15）
    - cron: '15 8 * * 1-5'
  # GitHubの画面から手動でいつでも実行できるボタンを有効化
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas yfinance sqlalchemy psycopg2-binary jquants-api-client google-generativeai requests

      - name: Run main script
        env:
          # GitHub Secretsから各キーを読み込み環境変数にセット
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JQUANTS_MAIL: ${{ secrets.JQUANTS_MAIL }}
          JQUANTS_PASSWORD: ${{ secrets.JQUANTS_PASSWORD }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

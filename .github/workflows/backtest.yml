name: Manual Backtest Report
on:
  workflow_dispatch: # 手動実行のみ

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # エラー解決のため google-generativeai を追加
          pip install pandas yfinance sqlalchemy psycopg2-binary requests google-generativeai google-genai

      - name: Execute Backtest
        env:
          # Supabase接続用（コロン形式に自動補正される前提）
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # J-Quants V2用の新しいキー
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          # Gemini 2.0分析用
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # 通知用
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # 修正されたエンジンを実行
        run: python -c "import backtest_engine; backtest_engine.run_backtest_and_report()"

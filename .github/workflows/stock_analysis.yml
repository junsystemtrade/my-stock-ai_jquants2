name: Stock AI Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5' # 日本時間18時（平日のみ）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt があればそれを使用、なければ個別にインストール
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install pandas yfinance sqlalchemy psycopg2-binary requests google-generativeai xlrd openpyxl
          fi

      - name: Run Sync and Analysis
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JQUANTS_MIN_INTERVAL_SEC: 13
        run: |
          # 1. J-Quants V2からデータを取得してSupabaseへ保存
          python -c "import portfolio_manager; portfolio_manager.sync_data()"
          # 2. Supabaseからデータを読み込んでGeminiで分析、Discordへ送信
          python -c "import backtest_engine; backtest_engine.run_backtest_and_report()"

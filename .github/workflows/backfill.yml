# .github/workflows/backfill.yml
# =====================================
# データベースへ過去3年間の株価データを格納・更新するためのワークフロー
name: Initial Backfill (3 Years)
on:
  workflow_dispatch: # 手動実行用
jobs:
  backfill:
    name: Initial Backfill (3 Years)
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      DATABASE_URL:        ${{ secrets.DATABASE_URL }}
      GOOGLE_API_KEY:      ${{ secrets.GOOGLE_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      YF_SINGLE_SLEEP:     "0.3"
      YF_CHUNK_SIZE:       "50"
      YF_SLEEP_SEC:        "3.0"
      DB_CHUNK_SIZE:       "1000"
    steps:
      - name: 📥 リポジトリをチェックアウト
        uses: actions/checkout@v5

      - name: 🐍 Pythonセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 依存ライブラリのインストール
        run: pip install -r requirements.txt

      - name: 🛠️ DBマイグレーション（初回・カラム追加）
        run: |
          python - <<'EOF'
          from database_manager import DBManager
          DBManager().migrate()
          EOF

      - name: 🚀 バックフィル処理を実行
        run: python portfolio_manager.py

      - name: 🔔 Discord通知
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            MSG="✅ **月次バックフィル完了**\n過去3年分の株価データ更新が正常に終了しました。（毎月28日 定期実行）"
          else
            MSG="❌ **月次バックフィル失敗**\n処理中にエラーが発生しました。ログを確認し、必要に応じて手動で再実行してください。"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}"

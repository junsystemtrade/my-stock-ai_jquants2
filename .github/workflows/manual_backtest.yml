# .github/workflows/manual_backtest.yml
# =======================================
# バックテストの手動実行 workflow
# GitHub の Actions タブから手動でトリガーする

name: Manual Backtest

on:
  workflow_dispatch:
    inputs:
      notify_discord:
        description: "Discord に結果を通知するか"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  backtest:
    runs-on: ubuntu-latest
    # 無料枠の限界値である6時間（360分）に設定
    timeout-minutes: 360

    env:
      DATABASE_URL:        ${{ secrets.DATABASE_URL }}
      JQUANTS_API_KEY:     ${{ secrets.JQUANTS_API_KEY }}
      GOOGLE_API_KEY:      ${{ secrets.GOOGLE_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      NOTIFY_DISCORD:      ${{ github.event.inputs.notify_discord }}
      # Pythonのバッファリングを無効化し、ログをリアルタイムでActions画面に表示させる
      PYTHONUNBUFFERED: "1"

    steps:
      - name: ☁️ リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 📊 バックテスト実行
        # 実行時の標準出力を維持
        run: python backtest_engine.py

      - name: 📝 最終ステータス通知（失敗時のみ）
        if: failure()
        run: |
          MSG="❌ **バックテスト失敗**: 6時間のタイムアウト、もしくはエラーにより中断されました。"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}"

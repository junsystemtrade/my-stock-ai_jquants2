# .github/workflows/weekly_report.yml
# =====================================
# 毎週土曜日 JST 08:00 に週次トレード成績レポートを通知
name: Weekly Trade Report
on:
  workflow_dispatch:       # 手動実行も可能
jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL:        ${{ secrets.DATABASE_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      PYTHONUNBUFFERED:    "1"
    steps:
      - name: ☁️ リポジトリをチェックアウト
        uses: actions/checkout@v5
      - name: 🐍 Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: 📦 依存パッケージのインストール
        run: pip install -r requirements.txt
      - name: 📊 週次レポート実行
        run: python weekly_report.py
      - name: 📝 失敗時通知
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **週次レポート失敗**: エラーが発生しました。\"}"

# signals_config.yml
# ==================
# シグナル条件の設定ファイル。
# コードを変更せずにここだけ編集してチューニングできます。

signals:

  # ---- ① ゴールデンクロス ----
  golden_cross:
    enabled: true
    short_window: 25
    long_window:  75

  # ---- ② RSI 売られすぎ ----
  rsi_oversold:
    enabled: true
    window:    14
    threshold: 30

  # ---- ③ 出来高急増 ----
  volume_surge:
    enabled: true
    window:     20
    multiplier: 2.0

filter:
  # 価格フィルター（低価格すぎる銘柄・高価格すぎる銘柄を除外）
  min_price:      500    # 500円未満は除外（ETFや低位株が多い）
  max_price:   50000     # 5万円超は除外
  min_data_days:  80     # 計算に必要な最低データ日数

  # ETF・REIT・インフラファンド除外
  # 証券コード 1000〜1999 は ETF・ETN・REIT が集中しているため除外
  exclude_code_range:
    - [1000, 1999]   # ETF・ETN・REIT・インフラファンド

  # 1銘柄あたりの最大通知シグナル数（複数シグナルが重複するのを防ぐ）
  max_signals_per_ticker: 1

backtest:
  hold_days:       10
  stop_loss_pct:   5.0
  initial_capital: 1000000
  position_size:   0.1

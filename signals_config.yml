# signals_config.yml
# ==================
# 戦略: トレンドフォロー・初動ブレイク狙い
# ターゲット: 流動性の高い中大型株

signals:
  # ---- ① トレンド発生のトリガー（ゴールデンクロスを初動として利用） ----
  golden_cross:
    enabled: true
    short_window: 5
    long_window: 25

  # ---- ② RSIによる「過熱感」のチェック ----
  rsi_oversold:
    enabled: true
    window: 14
    threshold: 50 

  # ---- ③ 出来高による「裏付け」 ----
  volume_surge:
    enabled: true
    window: 20
    multiplier: 2.0

filter:
  min_price: 500
  max_price: 50000
  min_data_days: 80

  exclude_code_range:
    - [1300, 1699] # 主要なETF/ETN
    - [2000, 2099] # ETN
    - [2500, 2639] # ETF
    - [2840, 2859] # ETF
    - [8950, 8999] # REIT

  min_daily_turnover_avg_20: 500000000 # 20日平均で5億円以上
  max_signals_per_ticker: 1

  # ==================================================
  # ⑤ 市場全体の地合いフィルター（サーキットブレーカー）
  # ==================================================
  market_breaker:
    enabled: true
    symbol: "^N225"            # 日経平均株価
    drop_threshold_pct: -1.5   # 前日比 -1.5% 以下の下落で発動

# ==================================================
# ④ スコアリング（優先順位付け）のロジック実装定義
# ==================================================
scoring_logic:
  enabled: true

  # 各指標の配点（合計100点）
  weights:
    volume_surge: 40      # 出来高の勢い（最大40点）
    bias_proximity: 30    # 25日線との近さ＝初動感（最大30点）
    rsi_position: 20      # RSIの立ち上がり（最大20点）
    liquidity_scale: 10   # 売買代金の大きさ（最大10点）

  # スコア算出のためのパラメータ
  parameters:
    # 出来高倍率がこの値以上なら、出来高スコア満点
    volume_max_multiplier: 5.0
    
    # 25日線乖離率がこの値(%)以内なら加点、超えると減点
    bias_limit_pct: 10.0
    
    # 売買代金がこの値（10億円）以上なら流動性スコア満点
    turnover_ideal_min: 1000000000

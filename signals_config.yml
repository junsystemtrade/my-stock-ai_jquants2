# signals_config.yml
# ==================
# 戦略: トレンドフォロー・初動ブレイク狙い
# ターゲット: 流動性の高い中大型株
#
# 【変更履歴】
# - RSI中立以下を無効化（PF0.43）
# - 出来高急増の閾値を2.0→3.0倍に引き上げ
# - GCにvolume_confirm追加
# - ma25_upward_bonus を0.0に変更
# - min_score: 55（低スコア帯の赤字を除外）
# - max_daily_entries: 2（上位2件のみに絞り込み）

signals:
  golden_cross:
    enabled: true
    short_window: 5
    long_window: 25
    volume_confirm: true
    volume_confirm_ratio: 1.5

  rsi_oversold:
    enabled: false
    window: 14
    threshold: 40

  volume_surge:
    enabled: true
    window: 20
    multiplier: 3.0

filter:
  min_price: 500
  max_price: 50000
  min_data_days: 80
  exclude_code_range:
    - [1300, 1699]
    - [2000, 2099]
    - [2500, 2639]
    - [2840, 2859]
    - [8950, 8999]
  min_daily_turnover_avg_20: 500000000
  max_signals_per_ticker: 1
  require_above_ma25: true
  market_breaker:
    enabled: true
    symbol: "NIY=F"
    drop_threshold_pct: -1.5
  stop_high:
    enabled: true

scoring_logic:
  enabled: true
  weights:
    volume_surge:    40
    bias_proximity:  30
    rsi_position:    20
    liquidity_scale: 10
  parameters:
    volume_max_multiplier: 5.0
    volume_penalty_above:  8.0
    bias_limit_pct:        10.0
    bias_ideal_min:        0.5
    bias_ideal_max:        5.0
    turnover_ideal_min:    1000000000
    rsi_ideal_range:       [40, 65]
    rsi_penalty_above:     72
    ma25_upward_bonus:     0.0

exit_rules:
  stop_loss_pct: 3.0
  immediate:
    dead_cross: true
    rsi_overbought: 70
  hold_days: 10
  trailing:
    enabled: true
    early_activation_pct: 4.0
    conditions:
      golden_cross_maintained: true
      rsi_below: 70
      profit_required: true

backtest:
  stop_loss_pct: 3.0
  initial_capital: 1000000
  position_size: 0.1
  max_daily_entries: 2    # ★変更: 3→2（上位2件のみ）
  market_crash_limit: -2.0
  min_score: 55           # ★NEW: 55点未満を除外

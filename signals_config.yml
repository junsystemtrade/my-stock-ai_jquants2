# signals_config.yml
# ==================
# 戦略: トレンドフォロー・初動ブレイク狙い
# ターゲット: 流動性の高い中大型株
#
# 【改善内容】
# 1. RSI中立以下を無効化（PF0.43、完全に足を引っ張っていたため）
# 2. 出来高急増の閾値を2.0倍→3.0倍に引き上げ（質の低いシグナルを削減）
# 3. ゴールデンクロスに出来高確認条件を追加（volume_confirm）
#    → GCと同時に出来高1.5倍以上を要求することで精度を上げる

signals:
  # ---- ① トレンド発生のトリガー（主力） ----
  golden_cross:
    enabled: true
    short_window: 5
    long_window: 25
    volume_confirm: true      # ★NEW: GC発生時に出来高1.5倍以上を要求
    volume_confirm_ratio: 1.5 # ★NEW: 出来高確認の閾値

  # ---- ② RSIによるチェック（無効化） ----
  rsi_oversold:
    enabled: false  # ★変更: PF0.43のため無効化
    window: 14
    threshold: 40

  # ---- ③ 出来高による裏付け（閾値引き上げ） ----
  volume_surge:
    enabled: true
    window: 20
    multiplier: 3.0  # ★変更: 2.0→3.0（質の低いシグナルを削減）

filter:
  min_price: 500
  max_price: 50000
  min_data_days: 80
  exclude_code_range:
    - [1300, 1699]
    - [2000, 2099]
    - [2500, 2639]
    - [2840, 2859]
    - [8950, 8999]
  min_daily_turnover_avg_20: 500000000
  max_signals_per_ticker: 1
  require_above_ma25: true
  market_breaker:
    enabled: true
    symbol: "NIY=F"
    drop_threshold_pct: -1.5
  stop_high:
    enabled: true

scoring_logic:
  enabled: true
  weights:
    volume_surge:    40
    bias_proximity:  30
    rsi_position:    20
    liquidity_scale: 10
  parameters:
    volume_max_multiplier: 5.0
    volume_penalty_above:  8.0
    bias_limit_pct:        10.0
    bias_ideal_min:        0.5
    bias_ideal_max:        5.0
    turnover_ideal_min:    1000000000
    rsi_ideal_range:       [40, 65]
    rsi_penalty_above:     72
    ma25_upward_bonus:     0.0  # ★変更: 5.0→0.0（スコア帯ずれを修正）

exit_rules:
  stop_loss_pct: 3.0
  immediate:
    dead_cross: true
    rsi_overbought: 70
  hold_days: 10
  trailing:
    enabled: true
    early_activation_pct: 4.0
    conditions:
      golden_cross_maintained: true
      rsi_below: 70
      profit_required: true

backtest:
  stop_loss_pct: 3.0
  initial_capital: 1000000
  position_size: 0.1
  max_daily_entries: 3
  market_crash_limit: -2.0

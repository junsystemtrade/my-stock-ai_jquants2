# signals_config.yml
# ==================
# ⚠️ これはテスト用の設定です。
# テスト後は本番用の設定に戻してください。

signals:

  # ---- ① ゴールデンクロス ----
  golden_cross:
    enabled: true
    short_window: 25
    long_window:  75

  # ---- ② RSI 売られすぎ ----
  # テスト用: 閾値を 30 → 60 に緩めて多くの銘柄でシグナルが出るようにする
  rsi_oversold:
    enabled: true
    window:    14
    threshold: 60   # ← テスト用（本番は 30）

  # ---- ③ 出来高急増 ----
  # テスト用: 倍率を 2.0 → 1.2 に緩める
  volume_surge:
    enabled: true
    window:     20
    multiplier: 1.2  # ← テスト用（本番は 2.0）

filter:
  min_price:      500
  max_price:   50000
  min_data_days:  80

  # ETF・REIT除外（テスト中も有効）
  exclude_code_range:
    - [1000, 1999]

  # テスト用: 1銘柄1シグナル
  max_signals_per_ticker: 1

backtest:
  hold_days:       10
  stop_loss_pct:   5.0
  initial_capital: 1000000
  position_size:   0.1

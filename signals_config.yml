# signals_config.yml
# ==================
# シグナル条件の設定ファイル。
# コードを変更せずにここだけ編集してチューニングできます。
# GitHub Actions の workflow からも参照されます。

signals:

  # ---- ① ゴールデンクロス ----
  # 短期移動平均が長期移動平均を下から上抜けした日
  golden_cross:
    enabled: true
    short_window: 25   # 短期MA の日数
    long_window:  75   # 長期MA の日数

  # ---- ② RSI 売られすぎ ----
  # RSI が閾値を下回ったとき（反発を期待する局面）
  rsi_oversold:
    enabled: true
    window:    14   # RSI の計算期間
    threshold: 30   # この値を下回ったらシグナル

  # ---- ③ 出来高急増 ----
  # 当日出来高が直近 N 日平均の X 倍を超えたとき
  volume_surge:
    enabled: true
    window:     20   # 平均出来高の計算期間（日）
    multiplier: 2.0  # 何倍を超えたらシグナルとするか

filter:
  min_price:     200    # 対象銘柄の最低株価（円）
  max_price:   50000    # 対象銘柄の最高株価（円）
  min_data_days:  80    # シグナル計算に必要な最低データ日数

backtest:
  hold_days:       10   # シグナル後の最大保有日数
  stop_loss_pct:   5.0  # ストップロス（%）。この下落で強制エグジット
  initial_capital: 1000000  # 仮想初期資金（円）
  position_size:   0.1  # 1トレードに使う資金割合（0.1 = 10%）

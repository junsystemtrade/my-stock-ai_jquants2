# signals_config.yml
# ==================
# 戦略: ゴールデンクロス特化・トレンド初動狙い
#
# 【スコアリング修正】
# 旧: 出来高40 / 乖離率30 / RSI20 / 流動性10
#     → 出来高急増前提の設計でGCには不向き
# 新: 乖離率40 / RSI30 / 流動性20 / 出来高10
#     → GCの質（適正な乖離率・RSI・流動性）を重視

signals:
  golden_cross:
    enabled: true
    short_window: 5
    long_window: 25
    require_ma25_upward: true
    volume_confirm: true
    volume_confirm_ratio: 1.2
    bias_range:
      enabled: true
      min_pct: -5.0
      max_pct: 10.0

  rsi_oversold:
    enabled: false
    window: 14
    threshold: 40

  volume_surge:
    enabled: false
    window: 20
    multiplier: 3.0

filter:
  min_price: 500
  max_price: 50000
  min_data_days: 80
  exclude_code_range:
    - [1300, 1699]
    - [2000, 2099]
    - [2500, 2639]
    - [2840, 2859]
    - [8950, 8999]
  min_daily_turnover_avg_20: 500000000
  max_signals_per_ticker: 1
  require_above_ma25: true
  market_breaker:
    enabled: true
    symbol: "NIY=F"
    drop_threshold_pct: -1.0
  stop_high:
    enabled: true

# GC特化スコアリング
# 乖離率・RSI・流動性を重視、出来高は補助的に
scoring_logic:
  enabled: true
  weights:
    volume_surge:    10   # 出来高（補助的）
    bias_proximity:  40   # 乖離率（GCの質を判断）
    rsi_position:    30   # RSI（過熱感チェック）
    liquidity_scale: 20   # 流動性（安定した銘柄を選ぶ）
  parameters:
    volume_max_multiplier: 5.0
    volume_penalty_above:  8.0
    bias_limit_pct:        10.0
    bias_ideal_min:        0.5    # 25日線から0.5%以上上
    bias_ideal_max:        5.0    # 25日線から5%以内が理想
    turnover_ideal_min:    3000000000  # 30億円以上で満点（流動性重視）
    rsi_ideal_range:       [45, 65]   # RSI45〜65が理想（過熱でも過売でもない）
    rsi_penalty_above:     70
    ma25_upward_bonus:     0.0

exit_rules:
  stop_loss_pct: 3.0
  immediate:
    dead_cross: true
    rsi_overbought: 75
  hold_days: 10
  trailing:
    enabled: true
    early_activation_pct: 3.0
    conditions:
      golden_cross_maintained: true
      rsi_below: 70
      profit_required: true

backtest:
  stop_loss_pct: 3.0
  initial_capital: 1000000
  position_size: 0.1
  max_daily_entries: 2
  market_crash_limit: -2.0
　min_score: 65.0              # 65点未満はエントリーしない
  exclude_score_ranges:
    - [95, 100]                # 95点以上の「過熱しすぎ」を除外

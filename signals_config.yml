# signals_config.yml
# ==================
# 戦略: トレンドフォロー・初動ブレイク狙い
# ターゲット: 流動性の高い中大型株

signals:
  # ---- ① トレンド発生のトリガー ----
  golden_cross:
    enabled: true
    short_window: 5
    long_window: 25

  # ---- ② RSIによるチェック ----
  rsi_oversold:
    enabled: true
    window: 14
    threshold: 40  # 50 -> 40 (本当の売られすぎに変更)

  # ---- ③ 出来高による裏付け ----
  volume_surge:
    enabled: true
    window: 20
    multiplier: 2.0

filter:
  min_price: 500
  max_price: 50000
  min_data_days: 80
  exclude_code_range:
    - [1300, 1699]  # 主要なETF/ETN
    - [2000, 2099]  # ETN
    - [2500, 2639]  # ETF
    - [2840, 2859]  # ETF
    - [8950, 8999]  # REIT
  min_daily_turnover_avg_20: 500000000
  max_signals_per_ticker: 1

  require_above_ma25: true  # ← 追加
　
  # 市場全体の地合いフィルター
  market_breaker:
    enabled: true
    symbol: "NIY=F"
    drop_threshold_pct: -1.5

  # ストップ高フィルター
  stop_high:
    enabled: true

# スコアリングロジック
scoring_logic:
  enabled: true
  weights:
    volume_surge: 40
    bias_proximity: 30
    rsi_position: 20
    liquidity_scale: 10
  parameters:
    volume_max_multiplier: 5.0
    bias_limit_pct: 10.0
    turnover_ideal_min: 1000000000
    rsi_ideal_range: [40, 65]

# 手じまいロジック設定
exit_rules:
  immediate:
    dead_cross: true
    rsi_overbought: 70
  hold_days: 10
  trailing:
    enabled: true
    conditions:
      golden_cross_maintained: true
      rsi_below: 70
      profit_required: true

# バックテストパラメータ
backtest:
  stop_loss_pct: 3.0          # 5.0 -> 3.0 (最大DD改善)
  initial_capital: 1000000
  position_size: 0.1
  max_daily_entries: 3
  market_crash_limit: -2.0
  exclude_score_range: [80, 85]  # 80-84.9点帯を除外
